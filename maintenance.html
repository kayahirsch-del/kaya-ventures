<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaya Hirsch — Maintenance Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab-btn { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab-btn.active { color: var(--rose-deep); border-bottom-color: var(--rose); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-header h3 { font-family: var(--font-display); font-style: italic; font-size: 18px; margin: 0; color: var(--rose-deep); font-weight: 400; }
  .cal-nav { background: none; border: 1px solid var(--border-strong); border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text-secondary); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: var(--text-muted); text-align: center; padding-bottom: 4px; }
  .cal-day { min-height: 56px; border: 1px solid var(--border); border-radius: 8px; padding: 6px; font-size: 12px; color: var(--text-secondary); background: var(--bg-card); cursor: default; }
  .cal-day.has-entry { background: #F6D9E4; border-color: var(--border-strong); cursor: pointer; }
  .cal-day.empty-cell { border: none; background: none; }
  .cal-day .daynum { font-family: var(--font-mono); font-size: 11px; }
  .cal-day .dots { display: flex; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
  .cal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); }
  .cal-day-detail { margin-top: 1rem; }

  #map-canvas { height: 420px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .map-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  .recur-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .recur-name { font-family: var(--font-display); font-size: 15.5px; }
  .recur-cat { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; color: var(--text-muted); }
  .recur-stat { text-align: right; }
  .recur-freq { font-family: var(--font-mono); font-size: 13px; color: var(--rose-deep); }
  .recur-count { font-size: 11px; color: var(--text-muted); }
  .recur-goal-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .recur-goal-row input { width: 56px; padding: 4px 6px; border: 1px solid var(--border-strong); border-radius: 6px; font-size: 11px; }
  .recur-goal-row span { font-size: 11px; color: var(--text-muted); }
  .status-badge { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; padding: 3px 9px; border-radius: 20px; margin-top: 4px; display: inline-block; }
  .status-overdue { background: #F7C1C1; color: #791F1F; }
  .status-soon { background: #FAC775; color: #633806; }
  .status-ontrack { background: #C0DD97; color: #27500A; }
  .due-banner { background: #F7C1C1; border: 1px solid #E24B4A; border-radius: 12px; padding: 12px 16px; margin-bottom: 1.5rem; font-size: 13px; color: #791F1F; }
  .due-banner strong { font-weight: 500; }

  :root {
    --bg-page: #FBF0F2;
    --bg-card: #FFFFFF;
    --bg-card-alt: #FDF6F7;
    --border: #F0CFDA;
    --border-strong: #E4A6BC;
    --rose: #B23A62;
    --rose-deep: #7A2745;
    --text-primary: #2E1B22;
    --text-secondary: #8C6472;
    --text-muted: #C79AAC;
    --font-display: 'Fraunces', Georgia, serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-page);
    background-image: radial-gradient(circle at 15% 0%, #FCE4EA 0%, transparent 45%);
    font-family: var(--font-sans);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 48px 20px 80px;
  }
  #root { max-width: 740px; margin: 0 auto; }

  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; border-bottom: 1px solid var(--border-strong); padding-bottom: 1.5rem; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--rose); margin: 0 0 6px; }
  .title { font-family: var(--font-display); font-style: italic; font-size: 34px; font-weight: 400; margin: 0; color: var(--rose-deep); }
  .sub { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px; }
  .newbtn { background: var(--rose); color: #fff; border: none; border-radius: 30px; padding: 10px 20px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; font-weight: 500; }
  .newbtn:hover { background: var(--rose-deep); }
  .signout { font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; margin-left: 12px; }
  .signout:hover { color: var(--rose-deep); }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .filter-chip { font-size: 12px; font-family: var(--font-mono); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-strong); background: #fff; color: var(--text-secondary); cursor: pointer; }
  .filter-chip.active { background: var(--rose); border-color: var(--rose); color: #fff; }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .summary-card .cat { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--rose); }
  .summary-card .last { font-family: var(--font-display); font-size: 15px; margin-top: 4px; color: var(--text-primary); }
  .summary-card .count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .entry-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; }
  .entry-date { font-family: var(--font-mono); font-size: 11px; color: var(--rose); min-width: 60px; }
  .entry-cat { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: #F6D9E4; color: #9B3A63; white-space: nowrap; }
  .entry-place { font-family: var(--font-display); font-size: 14.5px; flex: 1; }
  .entry-notes { font-size: 12px; color: var(--text-secondary); }
  .entry-source { font-size: 9.5px; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; }
  .entry-del { color: var(--text-muted); cursor: pointer; font-size: 12px; background: none; border: none; }
  .entry-del:hover { color: var(--rose-deep); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-family: var(--font-display); font-style: italic; font-size: 18px; }

  .auth-wrap { max-width: 360px; margin: 15vh auto 0; text-align: center; }
  .auth-wrap .eyebrow { justify-content: center; }
  .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-top: 20px; text-align: left; }
  .auth-card label { font-size: 11px; color: var(--text-secondary); display: block; margin: 12px 0 5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .auth-card label:first-child { margin-top: 0; }
  .auth-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 13px; font-family: var(--font-sans); }
  .auth-actions { display: flex; gap: 8px; margin-top: 18px; }
  .auth-actions button { flex: 1; padding: 10px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font-sans); font-weight: 500; }
  .auth-primary { border: none; background: var(--rose); color: #fff; }
  .auth-primary:hover { background: var(--rose-deep); }
  .auth-secondary { border: 1px solid var(--border-strong); background: none; color: var(--text-secondary); }
  .auth-error { color: var(--rose-deep); font-size: 12px; margin-top: 12px; display: none; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(122, 39, 69, 0.25); display: none; align-items: flex-start; justify-content: center; padding-top: 80px; z-index: 10; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 22px; width: 380px; max-width: 90%; border: 1px solid var(--border); }
  .modal h3 { margin: 0 0 14px; font-size: 18px; font-family: var(--font-display); font-style: italic; color: var(--rose-deep); }
  .modal label { font-size: 11px; color: var(--text-secondary); display: block; margin: 12px 0 5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .modal input, .modal select, .modal textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 13px; font-family: var(--font-sans); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .modal-actions button { padding: 9px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font-sans); font-weight: 500; }
  .btn-cancel { border: 1px solid var(--border-strong); background: none; color: var(--text-secondary); }
  .btn-save { border: none; background: var(--rose); color: #fff; }
  .btn-save:hover { background: var(--rose-deep); }

  .nav-link { font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); text-decoration: none; }
  .nav-link:hover { color: var(--rose-deep); }
</style>
</head>
<body>

<div id="auth-root" class="auth-wrap">
  <p class="eyebrow">Kaya Hirsch</p>
  <p class="title" style="text-align:center;">Maintenance log</p>
  <div class="auth-card">
    <label>Email</label>
    <input id="auth-email" type="email" placeholder="you@email.com" />
    <label>Password</label>
    <input id="auth-password" type="password" placeholder="At least 6 characters" />
    <div class="auth-actions">
      <button class="auth-secondary" id="auth-signup">Sign up</button>
      <button class="auth-primary" id="auth-signin">Log in</button>
    </div>
    <p class="auth-error" id="auth-error"></p>
  </div>
</div>

<div id="root" style="display:none;">
  <div class="header">
    <div>
      <p class="eyebrow">Kaya Hirsch <a href="index.html" class="nav-link" style="margin-left:8px;">venture log &rarr;</a></p>
      <p class="title">Maintenance log</p>
      <p class="sub"><span id="count">loading&hellip;</span><button class="signout" id="signout-btn">Sign out</button></p>
    </div>
    <button class="newbtn" id="new-btn">+ Log something</button>
  </div>

  <div id="due-banner"></div>
  <div id="summary" class="summary-grid"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="timeline">Timeline</button>
    <button class="tab-btn" data-tab="calendar">Calendar</button>
    <button class="tab-btn" data-tab="map">Map</button>
    <button class="tab-btn" data-tab="recurring">Recurring</button>
  </div>

  <div class="tab-panel active" id="panel-timeline">
    <div class="filters" id="filters"></div>
    <div id="list"></div>
    <p class="empty" id="empty" style="display:none;">Nothing logged yet — add your first one above.</p>
  </div>

  <div class="tab-panel" id="panel-calendar">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">&larr;</button>
      <h3 id="cal-title"></h3>
      <button class="cal-nav" id="cal-next">&rarr;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-day-detail" id="cal-day-detail"></div>
  </div>

  <div class="tab-panel" id="panel-map">
    <div id="map-canvas"></div>
    <p class="map-note">Markers group entries by place. A couple of locations are approximate where I didn't have an exact address.</p>
  </div>

  <div class="tab-panel" id="panel-recurring">
    <div id="recurring-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Log something</h3>
    <label>Category</label>
    <select id="modal-category">
      <option value="hair">Hair</option>
      <option value="nails">Nails</option>
      <option value="facial">Facial</option>
      <option value="massage">Massage</option>
      <option value="injectables">Injectables</option>
      <option value="waxing_threading">Waxing / threading</option>
      <option value="skincare">Skincare / derm</option>
      <option value="wellness">Wellness</option>
      <option value="dental">Dental</option>
      <option value="other">Other</option>
    </select>
    <label>Place / provider</label>
    <input id="modal-place" placeholder="e.g. Saint NYC, Dr. Airan" />
    <label>Date</label>
    <input id="modal-date" type="date" />
    <label>Notes</label>
    <input id="modal-notes" placeholder="Optional — units, product, how it went" />
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
(function() {
  const SUPABASE_URL = 'https://rtztcvvkzyqjunyctxbh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0enRjdnZrenlxanVueWN0eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3Mjk3OTIsImV4cCI6MjEwMDMwNTc5Mn0.28THw1ckqCgFqGWLstg_Yi3j_emyfzZ5J5FyIs0juII';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CATEGORIES = ['hair','nails','facial','massage','injectables','waxing_threading','skincare','wellness','dental','other'];
  const CAT_LABELS = { waxing_threading: 'Waxing / threading', injectables: 'Injectables', skincare: 'Skincare / derm' };
  function labelFor(cat) { return CAT_LABELS[cat] || (cat.charAt(0).toUpperCase() + cat.slice(1)); }

  let entries = [];
  let goals = {}; // key "place::category" -> target_days
  let activeFilter = null;

  function uid() { return crypto.randomUUID ? crypto.randomUUID() : 'i' + Date.now() + Math.floor(Math.random()*1000); }
  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function showAuth() { document.getElementById('auth-root').style.display = 'block'; document.getElementById('root').style.display = 'none'; }
  function showApp() { document.getElementById('auth-root').style.display = 'none'; document.getElementById('root').style.display = 'block'; }
  function authError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('auth-signup').addEventListener('click', async () => {
    authError('');
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { authError(error.message); return; }
    authError('Account created — check your email to confirm, then log in.');
  });
  document.getElementById('auth-signin').addEventListener('click', async () => {
    authError('');
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { authError(error.message); return; }
  });
  document.getElementById('signout-btn').addEventListener('click', async () => { await sb.auth.signOut(); });

  sb.auth.onAuthStateChange((event, session) => {
    if (session) { showApp(); load(); } else { showAuth(); }
  });

  async function load() {
    const { data, error } = await sb.from('maintenance_log').select('*').order('entry_date', { ascending: false });
    if (error) { console.error(error); return; }
    entries = (data || []).map(r => ({ id: r.id, category: r.category, place: r.place, provider: r.provider, date: Number(r.entry_date), notes: r.notes, source: r.source, address: r.address, lat: r.lat, lng: r.lng }));

    const { data: goalRows } = await sb.from('recurring_goals').select('*');
    goals = {};
    (goalRows || []).forEach(g => { goals[g.place + '::' + g.category] = { id: g.id, target_days: g.target_days }; });

    render();
  }

  function render() {
    const count = document.getElementById('count');
    count.textContent = entries.length + (entries.length === 1 ? ' entry logged' : ' entries logged');

    renderSummary();
    renderFilters();
    renderList();
    renderCalendar();
    renderRecurring();
    renderDueBanner();
    if (mapReady) renderMap();
  }

  function dueStatus(lastDate, targetDays) {
    const nextDue = lastDate + targetDays * 86400000;
    const daysUntil = Math.round((nextDue - Date.now()) / 86400000);
    if (daysUntil < 0) return { state: 'overdue', days: Math.abs(daysUntil) };
    if (daysUntil <= 5) return { state: 'soon', days: daysUntil };
    return { state: 'ontrack', days: daysUntil };
  }

  function renderDueBanner() {
    const banner = document.getElementById('due-banner');
    if (!banner) return;
    const byKey = {};
    entries.forEach(e => {
      const key = (e.place || e.provider || 'Unknown') + '::' + e.category;
      if (!byKey[key]) byKey[key] = [];
      byKey[key].push(e);
    });
    const overdue = [];
    Object.keys(byKey).forEach(key => {
      const goal = goals[key];
      if (!goal) return;
      const list = byKey[key].sort((a,b) => b.date - a.date);
      const status = dueStatus(list[0].date, goal.target_days);
      if (status.state === 'overdue') overdue.push({ name: key.split('::')[0], days: status.days });
    });
    if (overdue.length === 0) { banner.innerHTML = ''; return; }
    banner.innerHTML = `<div class="due-banner">${overdue.map(o => `<strong>${escapeHtml(o.name)}</strong> is ${o.days} day${o.days === 1 ? '' : 's'} overdue`).join(' &middot; ')}</div>`;
  }

  // ---- Tabs ----
  let mapReady = false;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'map') {
        if (!mapReady) { initMap(); mapReady = true; }
        setTimeout(() => { if (leafletMap) leafletMap.invalidateSize(); }, 50);
      }
    });
  });

  // ---- Calendar ----
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let selectedDay = null;

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    selectedDay = null;
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    selectedDay = null;
    renderCalendar();
  });

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    const title = document.getElementById('cal-title');
    if (!grid) return;
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    title.textContent = monthNames[calMonth] + ' ' + calYear;
    grid.innerHTML = '';
    ['S','M','T','W','T','F','S'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

    const byDay = {};
    entries.forEach(e => {
      const d = new Date(e.date);
      if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
        const day = d.getDate();
        if (!byDay[day]) byDay[day] = [];
        byDay[day].push(e);
      }
    });

    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day empty-cell';
      grid.appendChild(cell);
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement('div');
      const hasEntries = byDay[day] && byDay[day].length > 0;
      cell.className = 'cal-day' + (hasEntries ? ' has-entry' : '');
      cell.innerHTML = `<div class="daynum">${day}</div>`;
      if (hasEntries) {
        const dots = document.createElement('div');
        dots.className = 'dots';
        byDay[day].slice(0, 5).forEach(() => {
          const dot = document.createElement('span');
          dot.className = 'cal-dot';
          dots.appendChild(dot);
        });
        cell.appendChild(dots);
        cell.addEventListener('click', () => { selectedDay = day; renderCalDayDetail(byDay[day]); });
      }
      grid.appendChild(cell);
    }

    if (selectedDay && byDay[selectedDay]) renderCalDayDetail(byDay[selectedDay]);
    else document.getElementById('cal-day-detail').innerHTML = '';
  }

  function renderCalDayDetail(dayEntries) {
    const detail = document.getElementById('cal-day-detail');
    detail.innerHTML = '';
    dayEntries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      row.innerHTML = `
        <span class="entry-cat">${labelFor(e.category)}</span>
        <span class="entry-place">${escapeHtml(e.place || e.provider || '')}${e.notes ? ' — <span class=\"entry-notes\">' + escapeHtml(e.notes) + '</span>' : ''}</span>
      `;
      detail.appendChild(row);
    });
  }

  // ---- Map ----
  let leafletMap = null;
  let mapLayer = null;
  function initMap() {
    leafletMap = L.map('map-canvas').setView([40.73, -73.99], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(leafletMap);
    mapLayer = L.layerGroup().addTo(leafletMap);
    renderMap();
  }

  function renderMap() {
    if (!mapLayer) return;
    mapLayer.clearLayers();
    const byPlace = {};
    entries.forEach(e => {
      if (e.lat == null || e.lng == null) return;
      const key = e.place || 'Unknown';
      if (!byPlace[key]) byPlace[key] = { lat: e.lat, lng: e.lng, entries: [] };
      byPlace[key].entries.push(e);
    });
    const bounds = [];
    Object.keys(byPlace).forEach(place => {
      const g = byPlace[place];
      bounds.push([g.lat, g.lng]);
      const marker = L.marker([g.lat, g.lng]);
      const cats = [...new Set(g.entries.map(e => labelFor(e.category)))].join(', ');
      marker.bindPopup(`<b>${escapeHtml(place)}</b><br>${g.entries.length} visit${g.entries.length > 1 ? 's' : ''} — ${escapeHtml(cats)}`);
      marker.addTo(mapLayer);
    });
    if (bounds.length > 0) leafletMap.fitBounds(bounds, { padding: [30, 30] });
  }

  // ---- Recurring ----
  function renderRecurring() {
    const list = document.getElementById('recurring-list');
    if (!list) return;
    list.innerHTML = '';
    const byKey = {};
    entries.forEach(e => {
      const key = (e.place || e.provider || 'Unknown') + '::' + e.category;
      if (!byKey[key]) byKey[key] = [];
      byKey[key].push(e);
    });
    // include goals that don't have log entries yet
    Object.keys(goals).forEach(key => { if (!byKey[key]) byKey[key] = []; });

    const recurring = Object.keys(byKey)
      .map(key => {
        const es = byKey[key].sort((a,b) => a.date - b.date);
        const [name, cat] = key.split('::');
        let avgGapDays = null;
        if (es.length > 1) {
          const gaps = [];
          for (let i = 1; i < es.length; i++) gaps.push((es[i].date - es[i-1].date) / 86400000);
          avgGapDays = gaps.reduce((a,b) => a+b, 0) / gaps.length;
        }
        return { key, name, cat, count: es.length, avgGapDays, last: es.length ? es[es.length-1].date : null };
      })
      .filter(r => r.count >= 2 || goals[r.key])
      .sort((a,b) => b.count - a.count);

    if (recurring.length === 0) {
      list.innerHTML = '<p class="empty">Nothing recurring yet — log the same place twice and it\'ll show up here.</p>';
      return;
    }

    recurring.forEach(r => {
      const card = document.createElement('div');
      card.className = 'recur-card';
      const goal = goals[r.key];
      let statusHtml = '';
      if (goal && r.last) {
        const status = dueStatus(r.last, goal.target_days);
        const label = status.state === 'overdue' ? `Overdue by ${status.days}d` : status.state === 'soon' ? `Due in ${status.days}d` : `Due in ${status.days}d`;
        statusHtml = `<span class="status-badge status-${status.state}">${label}</span>`;
      } else if (goal && !r.last) {
        statusHtml = `<span class="status-badge status-soon">Not logged yet</span>`;
      }
      const freqText = r.avgGapDays ? (r.avgGapDays < 10 ? `every ${Math.round(r.avgGapDays)} days observed` : `every ${Math.round(r.avgGapDays / 7)} weeks observed`) : 'not enough history yet';

      const left = document.createElement('div');
      left.innerHTML = `
        <div class="recur-name">${escapeHtml(r.name)}</div>
        <div class="recur-cat">${labelFor(r.cat)}</div>
        <div class="recur-goal-row">
          <span>Goal: every</span>
          <input type="number" min="1" value="${goal ? goal.target_days : ''}" placeholder="30" id="goal-input-${cssKey(r.key)}" />
          <span>days</span>
        </div>
      `;

      const right = document.createElement('div');
      right.className = 'recur-stat';
      right.innerHTML = `
        <div class="recur-freq">${freqText}</div>
        <div class="recur-count">${r.count} visit${r.count === 1 ? '' : 's'}${r.last ? ' · last ' + fmtDate(r.last) : ''}</div>
        ${statusHtml}
      `;

      card.appendChild(left);
      card.appendChild(right);
      list.appendChild(card);

      const input = left.querySelector('input');
      input.addEventListener('change', async () => {
        const val = parseInt(input.value, 10);
        if (!val || val < 1) return;
        const [place, cat] = r.key.split('::');
        const id = goal ? goal.id : uid();
        goals[r.key] = { id, target_days: val };
        await sb.from('recurring_goals').upsert({ id, place, category: cat, target_days: val }, { onConflict: 'place,category' });
        render();
      });
    });
  }

  function cssKey(key) { return key.replace(/[^a-zA-Z0-9]/g, '_'); }

  function renderSummary() {
    const summary = document.getElementById('summary');
    summary.innerHTML = '';
    const byCat = {};
    entries.forEach(e => {
      if (!byCat[e.category]) byCat[e.category] = [];
      byCat[e.category].push(e);
    });
    Object.keys(byCat).sort((a,b) => byCat[b][0].date - byCat[a][0].date).forEach(cat => {
      const list = byCat[cat].sort((a,b) => b.date - a.date);
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="cat">${labelFor(cat)}</div>
        <div class="last">${fmtDate(list[0].date)}</div>
        <div class="count">${list.length} logged</div>
      `;
      summary.appendChild(card);
    });
  }

  function renderFilters() {
    const filters = document.getElementById('filters');
    filters.innerHTML = '';
    const usedCats = [...new Set(entries.map(e => e.category))];
    const allChip = document.createElement('button');
    allChip.className = 'filter-chip' + (activeFilter === null ? ' active' : '');
    allChip.textContent = 'All';
    allChip.addEventListener('click', () => { activeFilter = null; render(); });
    filters.appendChild(allChip);
    usedCats.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip' + (activeFilter === cat ? ' active' : '');
      chip.textContent = labelFor(cat);
      chip.addEventListener('click', () => { activeFilter = cat; render(); });
      filters.appendChild(chip);
    });
  }

  function renderList() {
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    list.innerHTML = '';
    const shown = activeFilter ? entries.filter(e => e.category === activeFilter) : entries;
    if (shown.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    shown.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      row.innerHTML = `
        <span class="entry-date">${fmtDate(e.date)}</span>
        <span class="entry-cat">${labelFor(e.category)}</span>
        <span class="entry-place">${escapeHtml(e.place || e.provider || '')}${e.notes ? ' — <span class=\"entry-notes\">' + escapeHtml(e.notes) + '</span>' : ''}</span>
        <span class="entry-source">${escapeHtml(e.source || '')}</span>
      `;
      const delBtn = document.createElement('button');
      delBtn.className = 'entry-del';
      delBtn.textContent = '\u2715';
      delBtn.addEventListener('click', async () => {
        entries = entries.filter(x => x.id !== e.id);
        render();
        await sb.from('maintenance_log').delete().eq('id', e.id);
      });
      row.appendChild(delBtn);
      list.appendChild(row);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('new-btn').addEventListener('click', () => {
    document.getElementById('modal-category').value = 'hair';
    document.getElementById('modal-place').value = '';
    document.getElementById('modal-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('modal-notes').value = '';
    document.getElementById('modal-overlay').classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
  });
  document.getElementById('modal-save').addEventListener('click', async () => {
    const category = document.getElementById('modal-category').value;
    const place = document.getElementById('modal-place').value.trim();
    const dateVal = document.getElementById('modal-date').value;
    const notes = document.getElementById('modal-notes').value.trim();
    if (!dateVal) return;
    const entry = { id: uid(), category, place, provider: null, date: new Date(dateVal + 'T12:00:00').getTime(), notes, source: 'manual' };
    entries.unshift(entry);
    document.getElementById('modal-overlay').classList.remove('open');
    render();
    await sb.from('maintenance_log').insert({ id: entry.id, category: entry.category, place: entry.place, entry_date: entry.date, notes: entry.notes, source: entry.source });
  });

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) { showApp(); load(); } else { showAuth(); }
  });
})();
</script>
</body>
</html>
