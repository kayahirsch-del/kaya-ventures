<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaya Hirsch — Venture Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  .vl-auth-wrap { max-width: 360px; margin: 15vh auto 0; text-align: center; }
  .vl-auth-wrap .vl-eyebrow { justify-content: center; }
  .vl-auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-top: 20px; text-align: left; }
  .vl-auth-card label { font-size: 11px; color: var(--text-secondary); display: block; margin: 12px 0 5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .vl-auth-card label:first-child { margin-top: 0; }
  .vl-auth-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 13px; font-family: var(--font-sans); }
  .vl-auth-actions { display: flex; gap: 8px; margin-top: 18px; }
  .vl-auth-actions button { flex: 1; padding: 10px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font-sans); font-weight: 500; }
  .vl-auth-primary { border: none; background: var(--rose); color: #fff; }
  .vl-auth-primary:hover { background: var(--rose-deep); }
  .vl-auth-secondary { border: 1px solid var(--border-strong); background: none; color: var(--text-secondary); }
  .vl-auth-error { color: var(--rose-deep); font-size: 12px; margin-top: 12px; display: none; }
  .vl-signout { font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; margin-left: 12px; }
  .vl-signout:hover { color: var(--rose-deep); }
  :root {
    --bg-page: #FBF0F2;
    --bg-card: #FFFFFF;
    --bg-card-alt: #FDF6F7;
    --border: #F0CFDA;
    --border-strong: #E4A6BC;
    --rose: #B23A62;
    --rose-deep: #7A2745;
    --text-primary: #2E1B22;
    --text-secondary: #8C6472;
    --text-muted: #C79AAC;
    --font-display: 'Fraunces', Georgia, serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-page);
    background-image: radial-gradient(circle at 15% 0%, #FCE4EA 0%, transparent 45%);
    font-family: var(--font-sans);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 48px 20px 80px;
  }
  #venture-log-root { max-width: 740px; margin: 0 auto; }

  .vl-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-strong); padding-bottom: 1.5rem; }
  .vl-eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--rose); margin: 0 0 6px; }
  .vl-title { font-family: var(--font-display); font-style: italic; font-size: 34px; font-weight: 400; margin: 0; color: var(--rose-deep); }
  .vl-sub { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px; }
  .vl-newbtn { background: var(--rose); color: #fff; border: none; border-radius: 30px; padding: 10px 20px; font-size: 13px; font-family: var(--font-sans); cursor: pointer; font-weight: 500; }
  .vl-newbtn:hover { background: var(--rose-deep); }

  .vl-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 14px; overflow: hidden; }
  .vl-card-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; }
  .vl-stage { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .vl-stage-spark { background: #FCEBC9; color: #8A5A1E; }
  .vl-stage-validating { background: #F6D9E4; color: #9B3A63; }
  .vl-stage-building { background: #F0BFD4; color: #7A2745; }
  .vl-stage-live { background: #D8EEDD; color: #2C6E42; }
  .vl-stage-shelved { background: #EDE7E9; color: #8C6472; }
  .vl-name { font-family: var(--font-display); font-size: 19px; font-weight: 500; flex: 1; color: var(--text-primary); }
  .vl-pitch { font-size: 12.5px; color: var(--text-secondary); max-width: 240px; text-align: right; }
  .vl-chevron { transition: transform 0.15s ease; color: var(--text-muted); font-style: normal; }
  .vl-chevron.open { transform: rotate(90deg); color: var(--rose); }

  .vl-body { border-top: 1px solid var(--border); padding: 16px 20px 18px; display: none; background: var(--bg-card-alt); }
  .vl-body.open { display: block; }
  .vl-entry { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size: 13.5px; }
  .vl-entry:last-child { border-bottom: none; }
  .vl-entry-date { font-family: var(--font-mono); font-size: 11px; color: var(--rose); white-space: nowrap; padding-top: 1px; min-width: 60px; }
  .vl-entry-text { flex: 1; line-height: 1.55; color: var(--text-primary); }
  .vl-entry-del { color: var(--text-muted); cursor: pointer; font-size: 12px; background: none; border: none; }
  .vl-entry-del:hover { color: var(--rose); }

  .vl-addrow { display: flex; gap: 8px; margin-top: 12px; }
  .vl-addrow input { flex: 1; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 20px; font-size: 13px; font-family: var(--font-sans); background: #fff; }
  .vl-addrow input:focus { outline: none; border-color: var(--rose); }
  .vl-addrow button { padding: 9px 16px; border: none; background: var(--rose); color: #fff; border-radius: 20px; font-size: 12.5px; cursor: pointer; font-weight: 500; }
  .vl-addrow button:hover { background: var(--rose-deep); }

  .vl-meta-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .vl-meta-row select { padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: 20px; font-size: 12px; font-family: var(--font-sans); background: #fff; color: var(--text-primary); }
  .vl-delete-idea { font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; margin-left: auto; }
  .vl-delete-idea:hover { color: var(--rose-deep); }
  .vl-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-family: var(--font-display); font-style: italic; font-size: 18px; }

  .vl-modal-overlay { position: fixed; inset: 0; background: rgba(122, 39, 69, 0.25); display: none; align-items: flex-start; justify-content: center; padding-top: 80px; z-index: 10; }
  .vl-modal-overlay.open { display: flex; }
  .vl-modal { background: #fff; border-radius: 16px; padding: 22px; width: 360px; max-width: 90%; border: 1px solid var(--border); }
  .vl-modal h3 { margin: 0 0 14px; font-size: 18px; font-family: var(--font-display); font-style: italic; color: var(--rose-deep); }
  .vl-modal label { font-size: 11px; color: var(--text-secondary); display: block; margin: 12px 0 5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .vl-modal input, .vl-modal select { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 13px; font-family: var(--font-sans); }
  .vl-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .vl-modal-actions button { padding: 9px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font-sans); font-weight: 500; }
  .vl-btn-cancel { border: 1px solid var(--border-strong); background: none; color: var(--text-secondary); }
  .vl-btn-save { border: none; background: var(--rose); color: #fff; }
  .vl-btn-save:hover { background: var(--rose-deep); }

  .vl-footer { text-align: center; margin-top: 40px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>

<div id="vl-auth-root" class="vl-auth-wrap">
  <p class="vl-eyebrow">Kaya Hirsch</p>
  <p class="vl-title" style="text-align:center;">Venture log</p>
  <div class="vl-auth-card">
    <label>Email</label>
    <input id="vl-auth-email" type="email" placeholder="you@email.com" />
    <label>Password</label>
    <input id="vl-auth-password" type="password" placeholder="At least 6 characters" />
    <div class="vl-auth-actions">
      <button class="vl-auth-secondary" id="vl-auth-signup">Sign up</button>
      <button class="vl-auth-primary" id="vl-auth-signin">Log in</button>
    </div>
    <p class="vl-auth-error" id="vl-auth-error"></p>
  </div>
</div>

<div id="venture-log-root" style="display:none;">
  <div class="vl-header">
    <div>
      <p class="vl-eyebrow">Kaya Hirsch</p>
      <p class="vl-title">Venture log</p>
      <p class="vl-sub"><span id="vl-count">loading&hellip;</span><button class="vl-signout" id="vl-signout-btn">Sign out</button></p>
    </div>
    <button class="vl-newbtn" id="vl-new-btn">+ New idea</button>
  </div>

  <div id="vl-list"></div>
  <p class="vl-empty" id="vl-empty" style="display:none;">No ideas yet — add your first one above.</p>

  <p class="vl-footer">personal build log</p>
</div>

<div class="vl-modal-overlay" id="vl-modal-overlay">
  <div class="vl-modal">
    <h3>New idea</h3>
    <label>Name</label>
    <input id="vl-modal-name" placeholder="e.g. Halo" />
    <label>One-line pitch</label>
    <input id="vl-modal-pitch" placeholder="What is it, in a sentence" />
    <label>Stage</label>
    <select id="vl-modal-stage">
      <option value="spark">Spark</option>
      <option value="validating">Validating</option>
      <option value="building">Building</option>
      <option value="live">Live</option>
      <option value="shelved">Shelved</option>
    </select>
    <div class="vl-modal-actions">
      <button class="vl-btn-cancel" id="vl-modal-cancel">Cancel</button>
      <button class="vl-btn-save" id="vl-modal-save">Create</button>
    </div>
  </div>
</div>

<script>
(function() {
  const SUPABASE_URL = 'https://rtztcvvkzyqjunyctxbh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0enRjdnZrenlxanVueWN0eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3Mjk3OTIsImV4cCI6MjEwMDMwNTc5Mn0.28THw1ckqCgFqGWLstg_Yi3j_emyfzZ5J5FyIs0juII';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let data = { ideas: [], logs: {} };
  let openId = null;

  function uid() { return crypto.randomUUID ? crypto.randomUUID() : 'i' + Date.now() + Math.floor(Math.random()*1000); }
  function fmtDate(d) {
    const dt = new Date(d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function showAuth() {
    document.getElementById('vl-auth-root').style.display = 'block';
    document.getElementById('venture-log-root').style.display = 'none';
  }
  function showApp() {
    document.getElementById('vl-auth-root').style.display = 'none';
    document.getElementById('venture-log-root').style.display = 'block';
  }
  function authError(msg) {
    const el = document.getElementById('vl-auth-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  document.getElementById('vl-auth-signup').addEventListener('click', async () => {
    authError('');
    const email = document.getElementById('vl-auth-email').value.trim();
    const password = document.getElementById('vl-auth-password').value;
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { authError(error.message); return; }
    authError('Account created — check your email to confirm, then log in.');
  });
  document.getElementById('vl-auth-signin').addEventListener('click', async () => {
    authError('');
    const email = document.getElementById('vl-auth-email').value.trim();
    const password = document.getElementById('vl-auth-password').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { authError(error.message); return; }
  });
  document.getElementById('vl-signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
  });

  sb.auth.onAuthStateChange((event, session) => {
    if (session) { showApp(); load(); } else { showAuth(); }
  });

  async function load() {
    const { data: ideaRows, error: ideaErr } = await sb.from('ideas').select('*').order('created', { ascending: false });
    const { data: logRows, error: logErr } = await sb.from('log_entries').select('*');
    if (ideaErr || logErr) { console.error(ideaErr, logErr); return; }
    const logs = {};
    (logRows || []).forEach(row => {
      if (!logs[row.idea_id]) logs[row.idea_id] = [];
      logs[row.idea_id].push({ id: row.id, text: row.entry_text, date: Number(row.entry_date) });
    });
    data = {
      ideas: (ideaRows || []).map(r => ({ id: r.id, name: r.name, pitch: r.pitch, stage: r.stage, created: Number(r.created) })),
      logs: logs
    };
    render();
  }

  function render() {
    const list = document.getElementById('vl-list');
    const empty = document.getElementById('vl-empty');
    const count = document.getElementById('vl-count');
    count.textContent = data.ideas.length + (data.ideas.length === 1 ? ' idea tracked' : ' ideas tracked');
    list.innerHTML = '';
    if (data.ideas.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    data.ideas.forEach(idea => {
      const entries = (data.logs[idea.id] || []).slice().sort((a,b) => b.date - a.date);
      const card = document.createElement('div');
      card.className = 'vl-card';

      const head = document.createElement('div');
      head.className = 'vl-card-head';
      head.innerHTML = `
        <i class="vl-chevron${openId === idea.id ? ' open' : ''}">&#9656;</i>
        <span class="vl-stage vl-stage-${idea.stage}">${idea.stage}</span>
        <span class="vl-name">${escapeHtml(idea.name)}</span>
        <span class="vl-pitch">${escapeHtml(idea.pitch || '')}</span>
      `;
      head.addEventListener('click', () => { openId = (openId === idea.id ? null : idea.id); render(); });
      card.appendChild(head);

      const body = document.createElement('div');
      body.className = 'vl-body' + (openId === idea.id ? ' open' : '');

      if (openId === idea.id) {
        const metaRow = document.createElement('div');
        metaRow.className = 'vl-meta-row';
        const select = document.createElement('select');
        ['spark','validating','building','live','shelved'].forEach(s => {
          const opt = document.createElement('option');
          opt.value = s; opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
          if (s === idea.stage) opt.selected = true;
          select.appendChild(opt);
        });
        select.addEventListener('change', async () => {
          idea.stage = select.value;
          render();
          await sb.from('ideas').update({ stage: idea.stage }).eq('id', idea.id);
        });
        metaRow.appendChild(select);
        const delIdeaBtn = document.createElement('button');
        delIdeaBtn.className = 'vl-delete-idea';
        delIdeaBtn.textContent = 'Delete idea';
        delIdeaBtn.addEventListener('click', async () => {
          data.ideas = data.ideas.filter(i => i.id !== idea.id);
          delete data.logs[idea.id];
          openId = null;
          render();
          await sb.from('ideas').delete().eq('id', idea.id);
        });
        metaRow.appendChild(delIdeaBtn);
        body.appendChild(metaRow);

        if (entries.length === 0) {
          const p = document.createElement('p');
          p.style.cssText = 'font-size:12px;color:var(--text-secondary);margin-top:12px;';
          p.textContent = 'No log entries yet.';
          body.appendChild(p);
        } else {
          const entriesWrap = document.createElement('div');
          entriesWrap.style.marginTop = '10px';
          entries.forEach(entry => {
            const row = document.createElement('div');
            row.className = 'vl-entry';
            row.innerHTML = `
              <span class="vl-entry-date">${fmtDate(entry.date)}</span>
              <span class="vl-entry-text">${escapeHtml(entry.text)}</span>
            `;
            const delBtn = document.createElement('button');
            delBtn.className = 'vl-entry-del';
            delBtn.textContent = '\u2715';
            delBtn.addEventListener('click', async () => {
              data.logs[idea.id] = data.logs[idea.id].filter(e => e.id !== entry.id);
              render();
              await sb.from('log_entries').delete().eq('id', entry.id);
            });
            row.appendChild(delBtn);
            entriesWrap.appendChild(row);
          });
          body.appendChild(entriesWrap);
        }

        const addRow = document.createElement('div');
        addRow.className = 'vl-addrow';
        const input = document.createElement('input');
        input.placeholder = 'What did you do on this today?';
        const addBtn = document.createElement('button');
        addBtn.textContent = 'Add';
        async function submitEntry() {
          const text = input.value.trim();
          if (!text) return;
          const entry = { id: uid(), text: text, date: Date.now() };
          if (!data.logs[idea.id]) data.logs[idea.id] = [];
          data.logs[idea.id].push(entry);
          input.value = '';
          render();
          await sb.from('log_entries').insert({ id: entry.id, idea_id: idea.id, entry_text: entry.text, entry_date: entry.date });
        }
        addBtn.addEventListener('click', submitEntry);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitEntry(); });
        addRow.appendChild(input);
        addRow.appendChild(addBtn);
        body.appendChild(addRow);
      }

      card.appendChild(body);
      list.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('vl-new-btn').addEventListener('click', () => {
    document.getElementById('vl-modal-name').value = '';
    document.getElementById('vl-modal-pitch').value = '';
    document.getElementById('vl-modal-stage').value = 'spark';
    document.getElementById('vl-modal-overlay').classList.add('open');
  });
  document.getElementById('vl-modal-cancel').addEventListener('click', () => {
    document.getElementById('vl-modal-overlay').classList.remove('open');
  });
  document.getElementById('vl-modal-save').addEventListener('click', async () => {
    const name = document.getElementById('vl-modal-name').value.trim();
    if (!name) return;
    const pitch = document.getElementById('vl-modal-pitch').value.trim();
    const stage = document.getElementById('vl-modal-stage').value;
    const idea = { id: uid(), name: name, pitch: pitch, stage: stage, created: Date.now() };
    data.ideas.unshift(idea);
    data.logs[idea.id] = [];
    openId = idea.id;
    document.getElementById('vl-modal-overlay').classList.remove('open');
    render();
    await sb.from('ideas').insert({ id: idea.id, name: idea.name, pitch: idea.pitch, stage: idea.stage, created: idea.created });
  });

  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) { showApp(); load(); } else { showAuth(); }
  });
})();
</script>
</body>
</html>
